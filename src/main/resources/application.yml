# ============================================================
# 购物平台信息系统 - 公共配置（所有环境共享）
# ============================================================

server:
  port: 8080

# 自定义上传配置
upload:
  path: uploads
  allowed-types: image/jpeg,image/png,image/gif,image/webp

spring:
  # 默认激活 dev 环境
  profiles:
    active: dev

  # 文件上传大小限制
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 20MB

  # 数据源通用配置（具体值在各环境配置中）
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.zaxxer.hikari.HikariDataSource
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 30000

  # Redis 通用配置（具体值在各环境配置中）
  data:
    redis:
      timeout: 5000
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

  # 邮件配置（QQ 邮箱 SMTP，凭据通过环境变量传入）
  mail:
    host: smtp.qq.com
    port: 465
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    protocol: smtp
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
          starttls:
            enable: true
            required: true

# ============================================================
# MyBatis-Plus 全局配置
# ============================================================
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.shoopping.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# ============================================================
# JWT 令牌配置
# ============================================================
jwt:
  secret: YWJjZGVmZ2hpamtsbW5vcHFyc3R1dnd4eXoxMjM0NTY3ODkwYWJjZGVmZ2hpamtsbW5vcA==
  expiration: 86400
  token-prefix: "Bearer "

# ============================================================
# 日志级别
# ============================================================
logging:
  level:
    com.shoopping: debug
    org.springframework: info

# ============================================================
# 生产环境配置
# 注意：敏感信息（数据库密码、Redis 密码）应通过环境变量传入
# ============================================================

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/shopping?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=true&allowPublicKeyRetrieval=false
    username: root
    # 生产密码从环境变量读取，默认值仅用于开发过渡
    password: ${DB_PASSWORD:root}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: 2

# 生产环境关闭 SQL 日志
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLogImpl

# 日志：只记录关键信息，写入文件
logging:
  level:
    com.shoopping: info
    org.springframework: warn
  file:
    name: logs/shopping-web.log
    max-size: 100MB
    max-history: 30

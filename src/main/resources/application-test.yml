# ============================================================
# 测试环境配置
# ============================================================

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/shopping?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root

  data:
    redis:
      host: localhost
      port: 6379
      # 测试环境使用独立 Redis 库，避免与开发环境数据混淆
      database: 1

# SQL 日志（测试阶段开启便于排查问题）
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
